<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老六 - 刘科的最强助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        .container {
            text-align: center;
        }
        
        .title {
            color: white;
            font-size: 28px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        /* 老六形象容器 */
        .laoliu-avatar {
            width: 400px;
            height: 500px;
            position: relative;
            margin: 0 auto;
        }
        
        /* 小龙虾外壳 - 身体 */
        .lobster-body {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 320px;
            background: linear-gradient(180deg, #ff6b6b 0%, #ee5a5a 50%, #d64545 100%);
            border-radius: 140px 140px 100px 100px;
            box-shadow: 
                inset -20px -20px 40px rgba(0,0,0,0.2),
                inset 20px 20px 40px rgba(255,255,255,0.3),
                0 20px 40px rgba(0,0,0,0.3);
        }
        
        /* 龙虾腹部纹理 */
        .lobster-body::before {
            content: '';
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 180px;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 25px,
                rgba(0,0,0,0.1) 25px,
                rgba(0,0,0,0.1) 27px
            );
            border-radius: 100px;
        }
        
        /* 熊猫头部 */
        .panda-head {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 200px;
            background: linear-gradient(180deg, #ffffff 0%, #f5f5f5 100%);
            border-radius: 110px;
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.2),
                inset 0 -10px 20px rgba(0,0,0,0.05);
            z-index: 10;
        }
        
        /* 熊猫耳朵 */
        .ear {
            position: absolute;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            border-radius: 50%;
            top: -20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .ear.left {
            left: 10px;
            transform: rotate(-20deg);
        }
        
        .ear.right {
            right: 10px;
            transform: rotate(20deg);
        }
        
        .ear::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            background: #ff9999;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.6;
        }
        
        /* 熊猫眼睛 */
        .eye {
            position: absolute;
            width: 55px;
            height: 70px;
            background: #2d2d2d;
            border-radius: 50%;
            top: 60px;
        }
        
        .eye.left {
            left: 45px;
            transform: rotate(-10deg);
        }
        
        .eye.right {
            right: 45px;
            transform: rotate(10deg);
        }
        
        /* 眼睛高光 */
        .eye::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 25px;
            background: white;
            border-radius: 50%;
            top: 15px;
            left: 15px;
        }
        
        .eye::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 10px;
            background: white;
            border-radius: 50%;
            top: 45px;
            left: 25px;
        }
        
        /* 鼻子 */
        .nose {
            position: absolute;
            width: 35px;
            height: 25px;
            background: #2d2d2d;
            border-radius: 50%;
            top: 115px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .nose::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 8px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            top: 5px;
            left: 8px;
        }
        
        /* 嘴巴 */
        .mouth {
            position: absolute;
            width: 60px;
            height: 30px;
            border: 4px solid #2d2d2d;
            border-top: none;
            border-radius: 0 0 60px 60px;
            top: 135px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        /* 腮红 */
        .cheek {
            position: absolute;
            width: 45px;
            height: 35px;
            background: radial-gradient(ellipse, #ffb6c1 0%, transparent 70%);
            border-radius: 50%;
            top: 110px;
            opacity: 0.8;
        }
        
        .cheek.left {
            left: 15px;
        }
        
        .cheek.right {
            right: 15px;
        }
        
        /* 龙虾触角 */
        .antenna {
            position: absolute;
            width: 8px;
            height: 80px;
            background: linear-gradient(180deg, #ff6b6b 0%, #ee5a5a 100%);
            border-radius: 4px;
            top: -60px;
            z-index: 5;
        }
        
        .antenna.left {
            left: 70px;
            transform: rotate(-15deg);
            transform-origin: bottom;
        }
        
        .antenna.right {
            right: 70px;
            transform: rotate(15deg);
            transform-origin: bottom;
        }
        
        .antenna::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #ffffff 0%, #f0f0f0 50%, #ff6b6b 50%, #ee5a5a 100%);
            border-radius: 50%;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            border: 3px solid #ff6b6b;
        }
        
        /* 龙虾大钳子 */
        .claw {
            position: absolute;
            width: 100px;
            height: 140px;
            bottom: 80px;
            z-index: 5;
        }
        
        .claw.left {
            left: -40px;
            transform: rotate(-20deg);
        }
        
        .claw.right {
            right: -40px;
            transform: rotate(20deg) scaleX(-1);
        }
        
        .claw-arm {
            position: absolute;
            width: 40px;
            height: 80px;
            background: linear-gradient(180deg, #ff6b6b 0%, #d64545 100%);
            border-radius: 20px;
            top: 20px;
            left: 30px;
        }
        
        .claw-hand {
            position: absolute;
            width: 80px;
            height: 70px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            border-radius: 40px 40px 20px 20px;
            bottom: 0;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2);
        }
        
        .claw-hand::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ffb6c1 0%, #ff9999 100%);
            border-radius: 50%;
            top: 15px;
            left: 20px;
        }
        
        /* 电脑 */
        .computer {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 140px;
            z-index: 15;
        }
        
        .screen {
            width: 180px;
            height: 110px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 10px;
            margin: 0 auto;
            border: 4px solid #333;
            position: relative;
            overflow: hidden;
        }
        
        /* 屏幕代码效果 */
        .screen::before {
            content: '</>';
            position: absolute;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-shadow: 0 0 10px #00ff00;
        }
        
        .screen::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,255,0,0.1) 2px,
                rgba(0,255,0,0.1) 4px
            );
            animation: scan 2s linear infinite;
        }
        
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        
        .stand {
            width: 30px;
            height: 20px;
            background: #333;
            margin: 0 auto;
        }
        
        .base {
            width: 80px;
            height: 10px;
            background: #333;
            border-radius: 5px;
            margin: 0 auto;
        }
        
        /* 名牌 */
        .name-tag {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            padding: 10px 25px;
            border-radius: 25px;
            border: 3px solid #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 20;
        }
        
        .name-tag h2 {
            color: #333;
            font-size: 24px;
            margin: 0;
        }
        
        .name-tag p {
            color: #666;
            font-size: 12px;
            margin: 5px 0 0 0;
        }
        
        /* 装饰星星 */
        .star {
            position: absolute;
            color: #ffd700;
            font-size: 20px;
            animation: twinkle 1.5s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        
        .star:nth-child(1) { top: 50px; left: 20px; animation-delay: 0s; }
        .star:nth-child(2) { top: 100px; right: 30px; animation-delay: 0.3s; }
        .star:nth-child(3) { bottom: 150px; left: 30px; animation-delay: 0.6s; }
        .star:nth-child(4) { top: 30px; right: 50px; animation-delay: 0.9s; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🦞 老六 - 刘科的最强助手 🐼</h1>
        
        <div class="laoliu-avatar">
            <!-- 装饰星星 -->
            <div class="star">✨</div>
            <div class="star">⭐</div>
            <div class="star">✨</div>
            <div class="star">⭐</div>
            
            <!-- 龙虾触角 -->
            <div class="antenna left"></div>
            <div class="antenna right"></div>
            
            <!-- 熊猫头部 -->
            <div class="panda-head">
                <!-- 耳朵 -->
                <div class="ear left"></div>
                <div class="ear right"></div>
                
                <!-- 眼睛 -->
                <div class="eye left"></div>
                <div class="eye right"></div>
                
                <!-- 腮红 -->
                <div class="cheek left"></div>
                <div class="cheek right"></div>
                
                <!-- 鼻子 -->
                <div class="nose"></div>
                
                <!-- 嘴巴 -->
                <div class="mouth"></div>
            </div>
            
            <!-- 龙虾身体 -->
            <div class="lobster-body"></div>
            
            <!-- 龙虾钳子 -->
            <div class="claw left">
                <div class="claw-arm"></div>
                <div class="claw-hand"></div>
            </div>
            <div class="claw right">
                <div class="claw-arm"></div>
                <div class="claw-hand"></div>
            </div>
            
            <!-- 电脑 -->
            <div class="computer">
                <div class="screen"></div>
                <div class="stand"></div>
                <div class="base"></div>
            </div>
            
            <!-- 名牌 -->
            <div class="name-tag">
                <h2>老六</h2>
                <p>刘科的最强助手</p>
            </div>
        </div>
    </div>
</body>
</html>
