<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025年A股分析白板图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .whiteboard {
            width: 900px;
            background: linear-gradient(135deg, #fefefe 0%, #f8f8f8 100%);
            border: 8px solid #333;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            position: relative;
        }
        
        .whiteboard::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 8px;
            background: #666;
            border-radius: 4px;
        }
        
        .subtitle {
            text-align: center;
            font-size: 18px;
            color: #333;
            margin-bottom: 25px;
            font-weight: bold;
        }
        
        .flow-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .section {
            flex: 1;
            text-align: center;
            position: relative;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        
        /* Reading Section */
        .reading-box {
            background: #fff;
            border: 3px solid #333;
            border-radius: 15px;
            padding: 20px;
            margin: 0 10px;
            position: relative;
        }
        
        .person-reading {
            width: 80px;
            height: 80px;
            margin: 0 auto 10px;
        }
        
        .thought-bubble {
            position: absolute;
            top: -25px;
            right: -10px;
            background: #e3f2fd;
            border: 2px solid #2196F3;
            border-radius: 15px;
            padding: 8px 12px;
            font-size: 12px;
            color: #1976D2;
        }
        
        .thought-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 15px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #2196F3;
        }
        
        /* Arrow */
        .arrow {
            font-size: 40px;
            color: #333;
            margin: 0 10px;
        }
        
        /* Processing Section */
        .processing-box {
            background: #fff;
            border: 3px solid #333;
            border-radius: 15px;
            padding: 20px;
            margin: 0 10px;
            position: relative;
        }
        
        .lightbulb {
            font-size: 50px;
            margin-bottom: 10px;
        }
        
        .time-label {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #FFD700;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #333;
        }
        
        .chart-simple {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 60px;
            gap: 5px;
            margin-top: 10px;
        }
        
        .bar {
            width: 20px;
            background: linear-gradient(to top, #4CAF50, #8BC34A);
            border-radius: 3px 3px 0 0;
            border: 2px solid #333;
        }
        
        .bar:nth-child(1) { height: 30%; }
        .bar:nth-child(2) { height: 45%; }
        .bar:nth-child(3) { height: 60%; }
        .bar:nth-child(4) { height: 80%; }
        .bar:nth-child(5) { height: 100%; }
        
        .chart-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        /* Result Section */
        .result-box {
            background: #fff;
            border: 3px solid #333;
            border-radius: 15px;
            padding: 20px;
            margin: 0 10px;
        }
        
        .before-after {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .comparison {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .label {
            font-size: 14px;
            font-weight: bold;
            color: #666;
        }
        
        .data-box {
            background: #e8f5e9;
            border: 2px solid #4CAF50;
            border-radius: 8px;
            padding: 8px 15px;
            font-size: 14px;
        }
        
        .data-box.before {
            background: #ffebee;
            border-color: #f44336;
        }
        
        .checkmark {
            font-size: 30px;
            color: #4CAF50;
        }
        
        /* Quote Section */
        .quote-box {
            background: #fff3e0;
            border: 3px solid #FF9800;
            border-radius: 20px;
            padding: 20px 30px;
            text-align: center;
            margin-top: 20px;
            position: relative;
        }
        
        .quote-box::before {
            content: '"';
            font-size: 60px;
            color: #FF9800;
            position: absolute;
            top: -10px;
            left: 15px;
            line-height: 1;
        }
        
        .quote-text {
            font-size: 18px;
            color: #E65100;
            font-weight: bold;
            line-height: 1.6;
        }
        
        /* Icons styling */
        .icon-text {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        
        .highlight {
            color: #2196F3;
            font-weight: bold;
        }
        
        .highlight-red {
            color: #f44336;
            font-weight: bold;
        }
        
        .highlight-green {
            color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="whiteboard">
        <div class="subtitle">Subtitle: 读报告 → 画图表 → 洞察市场</div>
        
        <div class="flow-container">
            <!-- Reading Section -->
            <div class="section">
                <div class="section-title">Reading</div>
                <div class="reading-box">
                    <div class="thought-bubble">A股数据...</div>
                    <svg class="person-reading" viewBox="0 0 100 100">
                        <!-- Head -->
                        <circle cx="50" cy="25" r="15" fill="none" stroke="#333" stroke-width="2"/>
                        <!-- Body -->
                        <path d="M50 40 L50 70" stroke="#333" stroke-width="2" fill="none"/>
                        <!-- Arms holding book -->
                        <path d="M50 50 L30 65 L45 70" stroke="#333" stroke-width="2" fill="none"/>
                        <path d="M50 50 L70 65 L55 70" stroke="#333" stroke-width="2" fill="none"/>
                        <!-- Book -->
                        <rect x="30" y="65" width="40" height="25" fill="#fff" stroke="#333" stroke-width="2"/>
                        <line x1="50" y1="65" x2="50" y2="90" stroke="#333" stroke-width="1"/>
                        <text x="35" y="80" font-size="8" fill="#333">2025</text>
                        <text x="55" y="80" font-size="8" fill="#333">A股</text>
                    </svg>
                    <div class="icon-text">2025 A股报告</div>
                </div>
            </div>
            
            <!-- Arrow -->
            <div class="arrow">→</div>
            
            <!-- Processing Section -->
            <div class="section">
                <div class="section-title">Analysis</div>
                <div class="processing-box">
                    <div class="time-label">数据整理</div>
                    <div class="lightbulb">💡</div>
                    <div class="chart-simple">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                    <div class="chart-label">指数走势分析</div>
                </div>
            </div>
            
            <!-- Arrow -->
            <div class="arrow">→</div>
            
            <!-- Result Section -->
            <div class="section">
                <div class="section-title">Result</div>
                <div class="result-box">
                    <div class="before-after">
                        <div class="comparison">
                            <span class="label">Before:</span>
                            <div class="data-box before">📊 原始数据</div>
                        </div>
                        <div class="comparison">
                            <span class="label">After:</span>
                            <div class="data-box">
                                <span class="highlight-green">沪指 +18.41%</span><br>
                                <span class="highlight-green">创指 +49.57%</span>
                            </div>
                            <span class="checkmark">✓</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="quote-box">
            <div class="quote-text">Quote: 从海量数据中提取关键信息，洞察市场趋势，形成清晰的投资决策。</div>
        </div>
    </div>
</body>
</html>
